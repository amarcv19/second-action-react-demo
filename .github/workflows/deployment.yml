name: Test Project 
on: push 
jobs: 
    test: 
        runs-on: ubuntu-latest 
        steps:
            - name: Get Code 
              uses: actions/checkout@v6
            - name: Install Node.js 
              uses: actions/setup-node@v6 
              with: 
                node-version: 22 
            - name: Installing dependencies 
              run: npm ci 
            - name: Run tests 
              run: npm test 

    deploy: 
        runs-on: ubuntu-latest 
        steps: 
            - name: Get Code 
              uses: actions/checkout@v6
            - name: Install Node.js 
              uses: actions/setup-node@v6
              with: 
                node-version: 22 
            - name: Installing dependencies 
              run: npm ci 
            - name: Deploy 
              run: echo "Deploying..."
            